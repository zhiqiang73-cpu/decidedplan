# 币安交易所配置文件
# 用于历史数据下载器

exchanges:
  binance:
    # API基础URL
    base_url: "https://fapi.binance.com"

    # API端点配置
    endpoints:
      klines:
        path: "/fapi/v1/klines"
        weight: 1
        limit: 1500
        params:
          interval: "1m"
        description: "1分钟K线数据"

      agg_trades:
        path: "/fapi/v1/aggTrades"
        weight: 1
        limit: 1000
        description: "聚合交易数据（逐笔成交）"

      funding_rate:
        path: "/fapi/v1/fundingRate"
        weight: 1
        limit: 1000
        description: "资金费率历史（每8小时结算）"

      open_interest:
        path: "/futures/data/openInterestHist"
        weight: 1
        limit: 500
        params:
          period: "5m"
        description: "持仓量历史（5分钟）"

      long_short_ratio:
        path: "/futures/data/globalLongShortAccountRatio"
        weight: 1
        limit: 500
        params:
          period: "5m"
        description: "多空持仓比（5分钟）"

      taker_ratio:
        path: "/futures/data/takerlongshortRatio"
        weight: 1
        limit: 500
        params:
          period: "5m"
        description: "主动买卖比（5分钟）"

    # 限流配置
    rate_limits:
      requests_per_minute: 1200
      safety_margin: 0.95  # 使用95%的限额作为安全边界

    # 下载配置
    download:
      symbol: "BTCUSDT"
      start_date: "2024-09-17T00:00:00Z"
      end_date: "2026-03-19T00:00:00Z"
      max_concurrent: 10  # 并发请求数
      timeout_seconds: 30  # 请求超时时间
      max_retries: 5  # 最大重试次数

    # 存储配置
    storage:
      base_path: "data/storage"
      cache_path: "data/cache"
      checkpoint_file: "checkpoints.json"
      partition_by_date: true
      compression: "snappy"
      row_group_size: 100000  # Parquet行组大小

    # 日志配置
    logging:
      level: "INFO"  # DEBUG, INFO, WARNING, ERROR
      file: "logs/downloader.log"
